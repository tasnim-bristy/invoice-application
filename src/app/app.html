<router-outlet />
<div class="invoice-card">
  <ui5-card>
    <div class="invoice-header">
      <ui5-text>Invoice Application</ui5-text>
      <ui5-button design="Emphasized">New Invoice</ui5-button>
    </div>
    <ui5-menu-separator></ui5-menu-separator>
    <div class="invo-details">
      <div class="details-header">
        <ui5-text>Invoice Details</ui5-text>
      </div>
      <ui5-menu-separator></ui5-menu-separator>

      <div class="invoice-user-details">
        <div class="invoice-deta">
          <div class="invoice-no">
            <ui5-label show-colon>Invoice No</ui5-label>
            <ui5-input></ui5-input>
          </div>
          <div class="invoice-no">
            <ui5-label show-colon>Invoice Date</ui5-label>
            <ui5-date-picker value="now"></ui5-date-picker>
          </div>
          <div class="invoice-no">
            <ui5-label show-colon>Customer Id</ui5-label>
            <ui5-input></ui5-input>
          </div>
        </div>
        <ui5-menu-separator></ui5-menu-separator>
        <div class="invoice-name">
          <ui5-label show-colon>Customer Name</ui5-label>
          <ui5-input></ui5-input>
        </div>
        <ui5-menu-separator></ui5-menu-separator>

        <div class="invoice-ad">
          <div class="invoice-address">
            <ui5-label show-colon>Address</ui5-label>
            <ui5-input></ui5-input>
          </div>
          <div class="invoice-tax">
            <ui5-label show-colon>Tax Code</ui5-label>
            <ui5-select>
              <ui5-option>TX124</ui5-option>
              <ui5-option selected>TX123</ui5-option>
              <ui5-option>TX125</ui5-option>
            </ui5-select>
          </div>
        </div>
        <ui5-menu-separator></ui5-menu-separator>
      </div>
    </div>

       <div class="invo-item">
        <div class="items-header">
        <ui5-text>Invoice Items</ui5-text>
      </div>
      <ui5-menu-separator></ui5-menu-separator>
    </div>
  </ui5-card>
</div>
